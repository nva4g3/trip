<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roundtrip Route Planner</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css"/>
</head>
<body>
    <h1>Roundtrip Route Planner</h1>
    <p>Enter your addresses and click "Finish" to get the shortest route in a round trip.</p>

    <div id="addresses">
        <div class="address-input">
            <input type="text" id="address-1" placeholder="Enter Address">
            <input type="text" id="postal-code-1" placeholder="Enter Postal Code">
            <button onclick="addAddress()">+</button>
        </div>
    </div>
    
    <button onclick="calculateRoute()">Finish</button>
    <div id="map" style="height: 500px; margin-top: 20px;"></div>

    <script src="script.js"></script>
</body>
</html>
